name: "Szociálpolitika"
description: "Szociális ellátás, lakhatás, családpolitika, szegénység, roma integráció"

feeds:
  - "telex"
  - "hvg"
  - "index_belfold"
  - "444"
  - "24hu"
  - "nepszava"
  - "rtl"
  - "origo"
  - "magyarnemzet"
  - "hirado"
  - "kormany"

filter:
  pattern: '(szocialis|lakhat|lakas(tamogatas|hitel|piac)|hajlektalan|szegenyseg|segely|szociális.?ellatas|gyermekvedel|csaladtamogat|roma|eselyegyenloseg|idos|gondoz|fogyatek).*'
  fields: ["title", "summary"]

ranking:
  query: >
    szociálpolitika lakhatás lakástámogatás hajléktalanság szegénység
    családtámogatás gyermekvédelem esélyegyenlőség idősek gondozás
  model: "paraphrase-multilingual-MiniLM-L12-v2"

output:
  filename: "szocialis_filtered.html"
  filename_ranked: "szocialis_ranked.html"
  archive: true
