# Tisza Tracker — Hungarian government promise tracker
# Main configuration file

database:
  path: "papers.db"
  all_feeds_path: "all_feed_entries.db"
  history_path: "matched_entries_history.db"
  promises_path: "promises.db"

feeds:
  # --- Independent / opposition-leaning ---
  telex:
    name: "Telex"
    url: "https://telex.hu/rss"
    enabled: true
  "444":
    name: "444.hu"
    url: "https://444.hu/feed"
    enabled: true
  hvg:
    name: "HVG"
    url: "https://hvg.hu/rss/rss.hvg/hirek"
    enabled: true
  nepszava:
    name: "Népszava"
    url: "https://nepszava.hu/feed"
    enabled: true

  # --- Large portals / mixed ---
  index:
    name: "Index"
    url: "https://index.hu/24ora/rss"
    enabled: true
  24hu:
    name: "24.hu"
    url: "https://24.hu/feed/"
    enabled: true
  origo:
    name: "Origo"
    url: "https://www.origo.hu/contentpartner/rss/hircentrum/origo.xml"
    enabled: true
  origo_itthon:
    name: "Origo Itthon"
    url: "https://www.origo.hu/contentpartner/rss/itthon/origo.rss"
    enabled: true
  rtl:
    name: "RTL.hu"
    url: "https://rtl.hu/rss"
    enabled: true

  # --- Business / economics ---
  portfolio:
    name: "Portfolio"
    url: "https://www.portfolio.hu/rss/all.xml"
    enabled: true
  vg:
    name: "Világgazdaság"
    url: "https://vg.hu/feed"
    enabled: true
  g7:
    name: "G7"
    url: "https://g7.hu/feed/"
    enabled: true

  # --- Government-aligned / right-leaning ---
  magyarnemzet:
    name: "Magyar Nemzet"
    url: "https://magyarnemzet.hu/feed/"
    enabled: true
  mandiner:
    name: "Mandiner"
    url: "https://mandiner.hu/rss"
    enabled: true
  168hu:
    name: "168.hu"
    url: "https://168.hu/feed"
    enabled: true

  # --- English-language ---
  hungarytoday:
    name: "Hungary Today"
    url: "https://hungarytoday.hu/feed"
    enabled: true
  budapesttimes:
    name: "Budapest Times"
    url: "https://budapesttimes.hu/feed"
    enabled: true

  # --- Government official ---
  kormany:
    name: "Kormány.hu"
    url: "https://kormany.hu/api/rss"
    enabled: true

defaults:
  time_window_days: 30
  top_n_per_topic: 20
  rank_threshold: 0.25
  ranking_negative_penalty: 0.20

promises:
  yaml_dir: "promises"
