    source: "Tisza program 2026"
    category: gazdasag
    filter_pattern: "(Földtörvény|földtulajdon|fiatal.?gazda|földbérlet|termőföld)"
    ranking_query: "Földtörvény felülvizsgálat fiatal gazda földtulajdon termőföld"
