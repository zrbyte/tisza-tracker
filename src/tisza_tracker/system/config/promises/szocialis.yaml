    source: "Tisza program 2026"
    category: szocialis
    filter_pattern: "(apaszabadság|apatárs.?szabadság|apai.?szabadság|3.?hét.?apa)"
    ranking_query: "apaszabadság apai szabadság 3 hét emelés állami"

  - id: CSAL-005
    text: "25%-os általános béremelés a szociális szektorban."
    text_en: "25% general pay raise in social sector."
    source: "Tisza program 2026"
    category: szocialis
    filter_pattern: "(szociális.?szektor.?bér|szociális.?dolgozó.?bér|szociális.?béremelés|gondozó.?bér)"
    ranking_query: "szociális szektor bér emelés dolgozó gondozó fizetés"

  - id: CSAL-006
    text: "700 ezer nehéz sorsú gyermeknek évi 100 ezer Ft iskolakezdési támogatás."
