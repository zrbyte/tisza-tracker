    source: "Tisza program 2026"
    category: szocialis
    filter_pattern: "(iskolakezdés.?támogatás|tanévkezdés.?támogatás|hátrányos.?gyermek.?támogatás)"
    ranking_query: "iskolakezdés tanévkezdés támogatás hátrányos helyzetű gyermek"

  - id: CSAL-007
    text: "Válás esetén nem kell visszafizetni a CSOK-ot."
    text_en: "No CSOK repayment in case of divorce."
    source: "Tisza program 2026"
    category: szocialis
    filter_pattern: "(CSOK.?visszafizet|CSOK.?válás|családi.?otthonteremtés.?válás)"
    ranking_query: "CSOK visszafizetés válás családi otthonteremtési kedvezmény"

  # --- NŐI ESÉLYEGYENLŐSÉG ---
  - id: NOI-001
    text: "Betartatjuk az egyenlő munkáért egyenlő bér elvét, bértranszparencia-törvényt hozunk."
    text_en: "Enforce equal pay, introduce pay transparency laws."
    source: "Tisza program 2026"
    category: szocialis
    filter_pattern: "(egyenlő.?bér|bértranszparencia|bérkülönbség.?nő|nők.?bér|nemek.?közötti.?bér)"
    ranking_query: "egyenlő bér bértranszparencia nők bérkülönbség nemek közötti"

  - id: NOI-002
    text: "Felszámoljuk a menstruációs szegénységet."
    text_en: "Eliminate menstrual poverty."
