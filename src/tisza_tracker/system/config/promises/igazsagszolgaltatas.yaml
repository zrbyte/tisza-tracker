# Promises mapped to the "igazsagszolgaltatas" topic — rule of law, justice,
# civil society.

promises:
  # --- JOGÁLLAM (rule of law, justice) ---
  - id: JOG-001
    text: "Két ciklusra korlátozzuk a miniszterelnöki mandátumot."
    text_en: "Limit PM mandate to two terms."
    source: "Tisza program 2026"
    category: igazsagszolgaltatas
    filter_pattern: "(miniszterelnök.?mandátum|két.?ciklus|hivatali.?idő.?korlát|cikluskorlát)"
    ranking_query: "miniszterelnök mandátum két ciklus korlát hivatali idő"

  - id: JOG-002
    text: "Megszüntetjük a rendeleti kormányzást."
    text_en: "End governance by decree."
    source: "Tisza program 2026"
    category: igazsagszolgaltatas
    filter_pattern: "(rendeleti.?kormányzás|kormányrendelet.?megszüntet|különleges.?jogrend|felhatalmazási)"
    ranking_query: "rendeleti kormányzás megszüntetés kormányrendelet különleges jogrend"

  - id: JOG-003
    text: "Visszaállítjuk a közmédia függetlenségét, új médiatörvényt alkotunk."
