    source: "Tisza program 2026"
    category: igazsagszolgaltatas
    filter_pattern: "(közmédia.?függetlenség|médiatörvény|MTVA|sajtószabadság|köztévé.?reform)"
    ranking_query: "közmédia függetlenség médiatörvény MTVA sajtószabadság reform"

  - id: JOG-004
    text: "Kormányváltás után azonnal felfüggesztjük a közmédia hírszolgáltatását."
    text_en: "Immediately suspend public media news after government change until objective conditions are met."
    source: "Tisza program 2026"
    category: igazsagszolgaltatas
    filter_pattern: "(közmédia.?felfüggeszt|híradó.?leáll|köztévé.?megszüntet|MTVA.?hír)"
    ranking_query: "közmédia hírszolgáltatás felfüggesztés kormányváltás köztévé"

  - id: JOG-005
    text: "Kivizsgáljuk a Pegasus-lehallgatási botrányt."
    text_en: "Investigate the Pegasus wiretapping scandal."
    source: "Tisza program 2026"
    category: igazsagszolgaltatas
    filter_pattern: "(Pegasus|lehallgatás|kémprogram|megfigyelés.?botrány|NSO)"
    ranking_query: "Pegasus lehallgatás kémprogram megfigyelés botrány vizsgálat"

  - id: JOG-006
    text: "Megszüntetjük a Szuverenitásvédelmi Hivatalt."
